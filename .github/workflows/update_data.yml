name: Automated Monthly Macro Data Ingestion

on:
  schedule:
    # Run at 06:00 AM UTC on the first day of every month
    - cron: '0 6 1 * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing by hiring managers!

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automated Data Acquisition Pipeline
        run: |
          python data_acquisition.py

      - name: Run Analytical & Visual Generation Scripts
        run: |
          cd notebooks
          python 01_EDA.py
          python 02_correlation_analysis.py
          python 03_time_series.py
          python 04_predictive_model.py

      - name: Commit and Push Updated Data & Hero Charts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ visuals/
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new macroeconomic data changes to commit."
          else
            git commit -m "chore(auto): update monthly macro dataset & regenerate hero charts [skip ci]"
            git push
          fi